<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur Handover — Anim'Gest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D2137;--navy-l:#112840;--navy-m:#1a3a5c;
  --gold:#D4A843;--gold-l:#e8c265;--gold-p:rgba(212,168,67,.13);--gold-b:rgba(212,168,67,.28);
  --text:#e8edf2;--muted:#8fa3b8;--dim:#4a6a82;
  --bdr:rgba(255,255,255,.08);
  --ok:#4caf82;--warn:#e8a84a;--err:#e05c5c;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui;background:var(--navy);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;
  background:radial-gradient(ellipse at 30% 40%,rgba(212,168,67,.07) 0%,transparent 60%),var(--navy)}
.auth-box{background:var(--navy-l);border:1px solid var(--gold-b);border-radius:18px;
  padding:3rem 2.5rem;max-width:400px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.auth-logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:.2rem}
.auth-tag{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2.5rem}
.auth-input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--gold-b);border-radius:9px;
  padding:.8rem 1rem;color:var(--text);font-size:1.1rem;font-family:inherit;
  text-align:center;letter-spacing:.3em;outline:none;margin-bottom:1rem;transition:border-color .2s}
.auth-input:focus{border-color:var(--gold)}
.auth-btn{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:9px;
  padding:.8rem;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;transition:opacity .2s}
.auth-btn:hover{opacity:.85}
.auth-err{color:var(--err);font-size:.78rem;margin-top:.8rem;min-height:1.2rem}
.auth-hint{font-size:.68rem;color:var(--dim);margin-top:1.5rem}

#app{display:none;min-height:100vh}
header{background:var(--navy-l);border-bottom:1px solid var(--gold-b);
  padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.h-brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.15rem}
.h-brand small{font-family:'DM Sans',sans-serif;font-size:.72rem;color:var(--muted);margin-left:.75rem;font-weight:300}
.h-right{display:flex;align-items:center;gap:.75rem}
.sprint-chip{background:var(--gold-p);border:1px solid var(--gold-b);border-radius:20px;
  padding:.28rem 1rem;font-size:.72rem;font-weight:600;color:var(--gold);letter-spacing:.05em}
.logout-btn{background:none;border:none;color:var(--dim);font-size:.72rem;cursor:pointer;font-family:inherit}
.logout-btn:hover{color:var(--muted)}
.wrap{max-width:980px;margin:0 auto;padding:1.75rem 1.5rem 3rem}

.tabs{display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap}
.t-btn{padding:.4rem 1rem;border-radius:20px;border:1px solid var(--bdr);
  background:transparent;color:var(--muted);font-size:.75rem;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.t-btn:hover{border-color:var(--gold-b);color:var(--text)}
.t-btn.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}

.prog{display:flex;gap:4px;margin-bottom:1.5rem}
.ps{flex:1;height:3px;border-radius:2px;background:var(--bdr);transition:background .3s}
.ps.on{background:var(--gold)}

.card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.4rem 1.5rem;margin-bottom:1rem}
.card-hd{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);
  margin-bottom:1.1rem;padding-bottom:.75rem;border-bottom:1px solid var(--gold-b)}
.sec-lbl{font-size:.67rem;font-weight:600;color:var(--dim);text-transform:uppercase;
  letter-spacing:.1em;margin:1.1rem 0 .55rem}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px}
.f{margin-bottom:.8rem}
.lbl{display:block;font-size:.72rem;color:var(--muted);margin-bottom:.3rem}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;background:rgba(0,0,0,.25);border:1px solid var(--bdr);
  border-radius:8px;padding:.52rem .85rem;color:var(--text);font-size:.83rem;
  font-family:inherit;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold-b)}
select option{background:#0D2137}
textarea{resize:vertical;min-height:58px;line-height:1.5}

.ri{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.ri input,.ri select{flex:1;min-width:0}
.del{flex-shrink:0;background:none;border:none;color:var(--err);cursor:pointer;
  font-size:1.25rem;padding:1px 5px;opacity:.6;transition:opacity .2s;line-height:1}
.del:hover{opacity:1}
.add{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:var(--gold);
  background:none;border:none;cursor:pointer;padding:.28rem 0;font-family:inherit;opacity:.8}
.add:hover{opacity:1}

.bug-hd{display:grid;grid-template-columns:2fr 1fr 110px 100px 28px;gap:6px;
  font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:5px;padding:0 2px}
.bug-row{display:grid;grid-template-columns:2fr 1fr 110px 100px 28px;gap:6px;
  align-items:center;margin-bottom:6px}
.bug-row input,.bug-row select{min-width:0}

.sc-row{display:flex;align-items:center;gap:12px;margin-bottom:.9rem}
.sc-lbl{width:78px;font-size:.78rem;color:var(--muted);flex-shrink:0}
.sc-row input[type=range]{flex:1;accent-color:var(--gold)}
.sc-val{width:52px;text-align:right;font-weight:600;font-size:.9rem;color:var(--gold)}
.global-score{background:var(--gold-p);border:1px solid var(--gold-b);border-radius:8px;
  padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.global-lbl{font-size:.8rem;color:var(--muted)}
.global-val{font-size:1.4rem;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif}

.chk{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem;font-size:.83rem;cursor:pointer}
.chk input{accent-color:var(--gold);width:14px;height:14px;flex-shrink:0}

.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:.25rem}
.chip{background:var(--gold-p);border:1px solid var(--gold-b);border-radius:5px;
  padding:.22rem .65rem;font-size:.68rem;color:var(--gold-l);font-family:'Courier New',monospace}

.out-box{background:rgba(0,0,0,.4);border:1px solid var(--bdr);border-radius:8px;
  padding:1rem 1.25rem;font-family:'Courier New',monospace;font-size:.7rem;
  line-height:1.7;white-space:pre-wrap;word-break:break-word;
  max-height:440px;overflow-y:auto;margin-top:1rem;color:#7aafc8}
.btn-gen{display:block;width:100%;padding:.85rem;background:var(--gold);color:var(--navy);
  border:none;border-radius:var(--r);font-size:.95rem;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:.03em;transition:opacity .2s;margin-bottom:.75rem}
.btn-gen:hover{opacity:.85}
.btn-copy{display:block;width:100%;padding:.68rem;background:rgba(76,175,130,.13);
  color:var(--ok);border:1px solid rgba(76,175,130,.3);border-radius:8px;
  font-size:.83rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:.6rem;transition:all .2s}
.btn-copy:hover{background:rgba(76,175,130,.22)}
.btn-dl{display:block;width:100%;padding:.68rem;background:transparent;color:var(--muted);
  border:1px solid var(--bdr);border-radius:8px;font-size:.83rem;cursor:pointer;
  font-family:inherit;margin-top:.5rem;transition:all .2s}
.btn-dl:hover{border-color:var(--gold-b);color:var(--text)}
.btn-reset{display:block;width:100%;padding:.55rem;background:transparent;color:var(--err);
  border:1px solid rgba(224,92,92,.3);border-radius:8px;font-size:.78rem;cursor:pointer;
  font-family:inherit;margin-top:.5rem;opacity:.7}
.btn-reset:hover{opacity:1}

.navb{display:flex;gap:10px;margin-top:1.5rem}
.nb{flex:1;padding:.65rem;border-radius:8px;font-size:.83rem;cursor:pointer;
  font-family:inherit;font-weight:500;transition:all .2s;border:none}
.nb.prev{background:transparent;border:1px solid var(--bdr);color:var(--muted)}
.nb.prev:hover{border-color:var(--gold-b);color:var(--text)}
.nb.next{background:var(--gold);color:var(--navy);font-weight:700}
.nb.next:hover{opacity:.85}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--navy-l);
  border:1px solid var(--gold-b);border-radius:8px;padding:.5rem 1.1rem;
  font-size:.75rem;color:var(--gold);opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:999}
.toast.show{opacity:1}

.badge-rouge{color:#ff6b6b;font-weight:600}
.badge-orange{color:#ffa94d;font-weight:600}
.badge-jaune{color:#ffd43b;font-weight:600}
.badge-vert{color:#69db7c;font-weight:600}
</style>
</head>

<div class="toast" id="toast">Sauvegardé &#10003;</div>

<script>
var SECRET = '@lgoritHme+977_73300';

function login(){
  var v = document.getElementById('pwd').value;
  if(v === SECRET){
    sessionStorage.setItem('ag_ok','1');
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadState(); renderAll();
  } else {
    var el = document.getElementById('auth-err');
    el.textContent = 'Mot de passe incorrect';
    document.getElementById('pwd').value = '';
    setTimeout(function(){ el.textContent=''; }, 3000);
  }
}

function logout(){
  sessionStorage.removeItem('ag_ok');
  location.reload();
}

window.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('ag_ok') === '1'){
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadState(); renderAll();
  }
});



var DEFAULT = {

    'a6f7514 — S61b : Avatar Eliot + drag + 20 avatars WebP + page widget-ia',
    'a822cc8 — S61c : Widget v2 drag fluide + panneau adaptatif + avatar temps reel',
    '12b0d9b — S61d : Suppression Poney_001 + .gitignore *.bak*'
  ],

  ps:[], tsx:[

    'devis_contrat_entete : DCE_ID, DCE_NUMERO, DCE_STATUT(BROUILLON vers FACTURE)',

var S = JSON.parse(JSON.stringify(DEFAULT));

var TABS = [
  {id:'meta',   lbl:'En-tête'},
  {id:'done',   lbl:'Accompli'},
  {id:'files',  lbl:'Fichiers'},
  {id:'bugs',   lbl:'Bugs'},
  {id:'scores', lbl:'Qualité'},
  {id:'road',   lbl:'Roadmap'},
  {id:'out',    lbl:'Générer'}
];

var cur = 0;
var saveTimer = null;

function saveState(){
  try{ localStorage.setItem('ag_hov', JSON.stringify(S)); } catch(e){}
  clearTimeout(saveTimer);
  var t = document.getElementById('toast');
  t.classList.add('show');
  saveTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

function loadState(){
  try{
    var d = localStorage.getItem('ag_hov');
    if(d){
      var p = JSON.parse(d);
      Object.keys(p).forEach(function(k){ S[k] = p[k]; });
    }
  } catch(e){}
}

function resetState(){
  if(!confirm('Réinitialiser avec les données S61 par défaut ?')) return;
  S = JSON.parse(JSON.stringify(DEFAULT));
  S.date = new Date().toLocaleDateString('fr-FR');
  saveState(); renderAll();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function upd(k,v){ S[k]=v; saveState(); }
function addI(k){ S[k].push(''); saveState(); renderAll(); }
function delI(k,i){ S[k].splice(i,1); saveState(); renderAll(); }
function updI(k,i,v){ S[k][i]=v; saveState(); }
function addB(){ S.bugs.push({l:'',m:'',c:'Moyenne',s:'Ouvert'}); saveState(); renderAll(); }
function delB(i){ S.bugs.splice(i,1); saveState(); renderAll(); }
function updB(i,f,v){ S.bugs[i][f]=v; saveState(); }
function goTo(i){ cur=i; renderAll(); }
function glo(){ return Math.round((S.sb+S.sf+S.sd)/3); }
function nxt(){
  var n = parseInt((S.sprint||'S58').replace(/\D/g,''))||58;
  return 'S'+(n+1);
}
function li(a){
  if(!a||!a.length) return '- (aucun)';
  var f = (a||[]).filter(function(v){ return (v||'').trim(); });
  return f.length ? f.map(function(v){ return '- '+v; }).join('\n') : '- (aucun)';
}

function listEd(k, ph){
  var rows = (S[k]||[]).map(function(v,i){
    return '<div class="ri"><input type="text" value="'+esc(v)+'" placeholder="'+ph+'"'
      +' oninput="updI(\''+k+'\','+i+',this.value)" />'
      +'<button class="del" onclick="delI(\''+k+'\','+i+')">x</button></div>';
  }).join('');
  return rows + '<button class="add" onclick="addI(\''+k+'\')">+ Ajouter</button>';
}

function renderAll(){
  document.getElementById('h-sprint').textContent = S.sprint||'SXX';
  document.getElementById('tabs').innerHTML = TABS.map(function(t,i){
    return '<button class="t-btn'+(i===cur?' on':'')+'" onclick="goTo('+i+')">'+t.lbl+'</button>';
  }).join('');
  document.getElementById('prog').innerHTML = TABS.map(function(_,i){
    return '<div class="ps'+(i<=cur?' on':'')+'"></div>';
  }).join('');

  var id = TABS[cur].id;
  var h = '';

  if(id === 'meta'){
    h = '<div class="card"><div class="card-hd">Informations de session</div>'
      +'<div class="g2">'
      +'<div class="f"><label class="lbl">Sprint</label><input type="text" value="'+esc(S.sprint)+'" placeholder="S61" oninput="upd(\'sprint\',this.value)" /></div>'
      +'<div class="f"><label class="lbl">Date</label><input type="text" value="'+esc(S.date)+'" oninput="upd(\'date\',this.value)" /></div>'
      +'</div>'
      +'<div class="f"><label class="lbl">Objectif de la session</label>'
      +'<input type="text" value="'+esc(S.objectif)+'" placeholder="ex : Démarrer Formules/Abonnements + Audit PDF->Modal" oninput="upd(\'objectif\',this.value)" /></div>'
      +'<div class="f"><label class="lbl">Statut global</label><select onchange="upd(\'statut\',this.value)">'
      +'<option'+(S.statut==='Terminé'?' selected':'')+'>Terminé</option>'
      +'<option'+(S.statut==='Partiellement terminé'?' selected':'')+'>Partiellement terminé</option>'
      +'<option'+(S.statut==='A reprendre'?' selected':'')+'>A reprendre</option>'
      +'</select></div>'
      +'<div class="sec-lbl">Règles projet immuables</div>'
      +'<div class="chips">'
      +['cd deploy avant docker compose',
        'COPIER_TOUTES_PAGES_v2.ps1 avant build frontend',
        'app.use() jamais app.get()',
        'getDb() jamais createConnection',
        'build --no-cache puis up -d api',
        'restart nginx après rebuild',
        'PDF = Modal uniquement — jamais window.open()',
        '"use client" = ligne 1 absolue',
        'TSX via scripts Python',
        'Pas de backtick dans SQL',
        'inject_v4_final.js INTERDIT',
        'git pull --rebase avant push',
        'CAC : pas de lien sidebar — fiche séance uniquement'
       ].map(function(r){ return '<span class="chip">'+r+'</span>'; }).join('')

    var b = document.querySelector('.btn-copy');
    b.textContent = 'Copié !';
    setTimeout(function(){ b.textContent = 'Copier dans le presse-papier'; }, 2000);

}

function dlMD(){
  if(!window._md) return;
  var sp = window._sp||'SXX';
  var blob = new Blob([window._md], {type:'text/markdown;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'HANDOVER_'+sp+'_FIN.md';
  a.click();
}
