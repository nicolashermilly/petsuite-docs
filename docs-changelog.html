var sel = 'S62';

function selectSprint(id){ sel=id; render(); }

function sc(v){ return v>=80?'var(--ok)':v>=60?'var(--warn)':'var(--err)'; }

function itemsHtml(arr, type){
  if(!arr||!arr.length) return '<div class="empty">Aucun element</div>';
  return '<div class="item-list">'+arr.map(function(v){
    var parts = v.split(' — ');
    var title = parts[0], desc = parts.slice(1).join(' — ');
    return '<div class="item">'
      +'<span class="itag t-'+type+'">'+type.toUpperCase()+'</span>'
      +'<div class="ibody"><div class="ititle">'+title+'</div>'
      +(desc?'<div class="idesc">'+desc+'</div>':'')
      +'</div></div>';
  }).join('')+'</div>';
}

  document.getElementById('sprint-nav-container').innerHTML =
    '<div class="sprint-nav">'+SPRINTS.map(function(s){
      var cls = 'sp-btn'+(s.id===sel?' on':'')+(s.statut==='current'&&s.id!==sel?' current-btn':'');
      return '<button class="'+cls+'" onclick="selectSprint(\''+s.id+'\')">'+s.id+'</button>';
    }).join('')+'</div>';

  var s = cur;
  var isCurrent = s.statut==='current';
  var g = s.scores.global;
  var h = '';

  // Header
  h += '<div class="sprint-header">';
  h += '<div class="sprint-badge-big'+(isCurrent?' current':'')+'">'+s.id+'</div>';
  h += '<div class="sprint-info">';
  h += '<div class="sprint-title-txt">'+s.titre+'</div>';
  h += '<div class="sprint-date">'+s.date;
  if(isCurrent) h += '&nbsp;<span class="badge-current"><div class="dot-pulse"></div>En cours</span>';
  else h += '&nbsp;<span class="badge-done">Termine</span>';
  h += '</div></div>';
  if(g>0) h += '<div class="sprint-score-box"><div class="ssv" style="color:'+sc(g)+'">'+g+'</div><div class="ssl">Global /100</div></div>';
  h += '</div>';

  // Scores
  if(g>0){
    h += '<div class="score-row">';
    [['backend','Backend'],['frontend','Frontend'],['bdd','BDD'],['global','Global']].forEach(function(p){
      var v=s.scores[p[0]]||0;
      h+='<div class="sc"><div class="sc-v" style="color:'+sc(v)+'">'+v+'</div><div class="sc-l">'+p[1]+'</div></div>';
    });
    h += '</div>';
  }

  // Commits
  if(s.commits&&s.commits.length){
    h += '<div class="sec"><div class="sec-title"><span class="sec-num">GIT</span> Commits</div>';
    h += '<div class="commit-list">'+s.commits.map(function(c){
      return '<div class="commit"><span class="chash">'+c.hash+'</span><span class="cmsg">'+c.msg+'</span></div>';
    }).join('')+'</div></div>';
  }

  // Realisations
  var secs = [{k:'front',l:'Frontend',t:'front'},{k:'back',l:'API / Back-end',t:'api'},
              {k:'bdd',l:'Base de donnees',t:'bdd'},{k:'fix',l:'Corrections & Outils',t:'fix'}];
  var n = 1;
  secs.forEach(function(sec){
    if(s[sec.k]&&s[sec.k].length){
      h += '<div class="sec"><div class="sec-title"><span class="sec-num">0'+n+'</span> '+sec.l+'</div>';
      h += itemsHtml(s[sec.k],sec.t)+'</div>'; n++;
    }
  });

  // Bugs
  if(s.bugs&&s.bugs.length){
    h += '<div class="sec"><div class="sec-title"><span class="sec-num">BUG</span> Bugs connus</div>';
    h += '<table><thead><tr><th>Description</th><th>Module</th><th>Criticite</th></tr></thead><tbody>';
    s.bugs.forEach(function(b){
      var cc=b.c==='Haute'?'var(--err)':b.c==='Moyenne'?'var(--warn)':'var(--muted)';
      h+='<tr><td>'+b.l+'</td><td style="color:var(--muted)">'+b.m+'</td><td style="color:'+cc+'">'+b.c+'</td></tr>';
    });
    h += '</tbody></table></div>';
  }

  document.getElementById('main-content').innerHTML = h;
}

window.addEventListener('DOMContentLoaded', function(){ render(); });
</script>
</body>
</html>
