<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Qualité — Anim'Gest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D2137;--navy-l:#112840;--navy-m:#1a3a5c;
  --gold:#D4A843;--gold-l:#e8c265;--gold-p:rgba(212,168,67,.13);--gold-b:rgba(212,168,67,.28);
  --text:#e8edf2;--muted:#8fa3b8;--dim:#4a6a82;
  --bdr:rgba(255,255,255,.08);
  --ok:#4caf82;--warn:#e8a84a;--err:#e05c5c;--info:#5b9bd5;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui;background:var(--navy);color:var(--text);min-height:100vh;font-size:14px}

#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;
  background:radial-gradient(ellipse at 30% 40%,rgba(212,168,67,.07) 0%,transparent 60%),var(--navy)}
.auth-box{background:var(--navy-l);border:1px solid var(--gold-b);border-radius:18px;
  padding:3rem 2.5rem;max-width:380px;width:100%;text-align:center}
.auth-logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:.2rem}
.auth-tag{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem}
.auth-input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--gold-b);border-radius:9px;
  padding:.8rem 1rem;color:var(--text);font-size:1rem;font-family:inherit;
  text-align:center;letter-spacing:.25em;outline:none;margin-bottom:.75rem;transition:border-color .2s}
.auth-input:focus{border-color:var(--gold)}
.auth-btn{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:9px;
  padding:.75rem;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit}
.auth-btn:hover{opacity:.85}
.auth-err{color:var(--err);font-size:.75rem;margin-top:.6rem;min-height:1rem}

#app{display:none}
header{background:var(--navy-l);border-bottom:1px solid var(--gold-b);
  padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
.h-brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.15rem}
.h-brand small{font-size:.72rem;color:var(--muted);margin-left:.75rem;font-weight:300;font-family:'DM Sans',sans-serif}
.h-actions{display:flex;gap:.75rem;align-items:center}
.logout{background:none;border:none;color:var(--dim);font-size:.72rem;cursor:pointer;font-family:inherit}
.logout:hover{color:var(--muted)}
.wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 3rem}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.75rem}
.kpi{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem 1.25rem}
.kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.kpi-value{font-size:2rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold);line-height:1}
.kpi-sub{font-size:.72rem;color:var(--dim);margin-top:.35rem}
.kpi-delta{font-size:.75rem;margin-top:.3rem}
.delta-up{color:var(--ok)}
.delta-down{color:var(--err)}
.delta-flat{color:var(--muted)}

/* CHART */
.chart-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);
  padding:1.4rem 1.5rem;margin-bottom:1rem}
.card-hd{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);
  margin-bottom:1.1rem;padding-bottom:.75rem;border-bottom:1px solid var(--gold-b)}
.chart-area{height:220px;position:relative;margin-top:.5rem}
.chart-svg{width:100%;height:100%}

/* BARS CHART */
.bars-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1rem}
.bar-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.2rem}
.bar-title{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:1rem}
.bar-item{margin-bottom:.75rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.bar-label{font-size:.75rem;color:var(--muted);width:80px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.bar-val{font-size:.75rem;font-weight:600;width:40px;text-align:right;flex-shrink:0}

/* PATCHES TABLE */
.patches-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);
  padding:1.4rem 1.5rem;margin-bottom:1rem}
.patch-row{display:flex;align-items:flex-start;gap:12px;padding:.75rem 0;
  border-bottom:1px solid var(--bdr)}
.patch-row:last-child{border-bottom:none}
.patch-id{font-family:'Courier New',monospace;font-size:.7rem;
  background:var(--gold-p);border:1px solid var(--gold-b);border-radius:4px;
  padding:.2rem .5rem;color:var(--gold);flex-shrink:0;white-space:nowrap}
.patch-body{flex:1}
.patch-titre{font-size:.85rem;font-weight:500;margin-bottom:.2rem}
.patch-desc{font-size:.75rem;color:var(--muted)}
.risque-badge{font-size:.65rem;font-weight:600;padding:.18rem .55rem;border-radius:4px;flex-shrink:0;margin-top:2px}
.r-nul{background:rgba(76,175,130,.15);color:var(--ok)}
.r-faible{background:rgba(91,155,213,.15);color:var(--info)}
.r-moyen{background:rgba(232,168,74,.15);color:var(--warn)}
.r-eleve{background:rgba(224,92,92,.15);color:var(--err)}

/* SPRINT SELECTOR */
.sprint-nav{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap}
.sp-btn{padding:.35rem .9rem;border-radius:20px;border:1px solid var(--bdr);
  background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;
  transition:all .2s;font-family:inherit}
.sp-btn:hover{border-color:var(--gold-b);color:var(--text)}
.sp-btn.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}

/* IMPORT */
.import-zone{background:var(--navy-l);border:2px dashed var(--gold-b);border-radius:var(--r);
  padding:1.5rem;text-align:center;margin-bottom:1rem;cursor:pointer;transition:all .2s}
.import-zone:hover{border-color:var(--gold);background:var(--gold-p)}
.import-zone p{font-size:.8rem;color:var(--muted)}
.import-zone strong{color:var(--gold)}
.btn-import{background:var(--gold-p);border:1px solid var(--gold-b);border-radius:8px;
  padding:.5rem 1.1rem;color:var(--gold);font-size:.8rem;font-weight:600;
  cursor:pointer;font-family:inherit;margin-top:.75rem;transition:all .2s}
.btn-import:hover{background:rgba(212,168,67,.2)}
.btn-add-sprint{background:var(--gold);border:none;border-radius:8px;
  padding:.55rem 1.25rem;color:var(--navy);font-size:.82rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-add-sprint:hover{opacity:.85}

/* FORM SPRINT */
.sprint-form{background:var(--navy-l);border:1px solid var(--gold-b);border-radius:var(--r);
  padding:1.4rem 1.5rem;margin-bottom:1rem;display:none}
.sprint-form.open{display:block}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.sf .lbl{display:block;font-size:.7rem;color:var(--muted);margin-bottom:.3rem}
.sf input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--bdr);border-radius:7px;
  padding:.5rem .8rem;color:var(--text);font-size:.85rem;font-family:inherit;outline:none}
.sf input:focus{border-color:var(--gold-b)}
.btn-save{background:var(--gold);border:none;border-radius:7px;padding:.55rem 1.25rem;
  color:var(--navy);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cancel{background:transparent;border:1px solid var(--bdr);border-radius:7px;padding:.55rem 1rem;
  color:var(--muted);font-size:.82rem;cursor:pointer;font-family:inherit;margin-left:.5rem}

/* PROGRESS RING */
.ring-wrap{display:flex;justify-content:center;gap:2rem;margin:1rem 0}
.ring-item{text-align:center}
.ring-label{font-size:.72rem;color:var(--muted);margin-top:.5rem}
</style>
</head>
<body>

<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">Anim'Gest</div>
    <div class="auth-tag">NoSage's Editor &middot; Dashboard Qualité</div>
    <input class="auth-input" type="password" id="pwd" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
      onkeydown="if(event.key==='Enter')login()" autofocus />
    <button class="auth-btn" onclick="login()">Accéder &rarr;</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="h-brand">Anim'Gest <small>Dashboard Qualité Code</small></div>
    <div class="h-actions">
      <button class="btn-add-sprint" onclick="toggleForm()">+ Saisir sprint</button>
      <button class="logout" onclick="logout()">Déconnexion</button>
    </div>
  </header>
  <div class="wrap">
    <div class="sprint-form" id="sprint-form">
      <div class="card-hd" style="font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--gold-b)">Saisir les résultats d'un sprint</div>
      <div class="sg">
        <div class="sf"><label class="lbl">Sprint</label><input type="text" id="f-sprint" placeholder="S58" /></div>
        <div class="sf"><label class="lbl">Backend /100</label><input type="number" id="f-back" min="0" max="100" placeholder="82" /></div>
        <div class="sf"><label class="lbl">Frontend /100</label><input type="number" id="f-front" min="0" max="100" placeholder="80" /></div>
        <div class="sf"><label class="lbl">BDD /100</label><input type="number" id="f-bdd" min="0" max="100" placeholder="85" /></div>
      </div>
      <div class="sg">
        <div class="sf"><label class="lbl">Routes API</label><input type="number" id="f-routes" placeholder="90" /></div>
        <div class="sf"><label class="lbl">Pages UI</label><input type="number" id="f-pages" placeholder="100" /></div>
        <div class="sf"><label class="lbl">JSDoc (/ 137)</label><input type="number" id="f-jsdoc" placeholder="133" /></div>
        <div class="sf"><label class="lbl">Colonnes BDD (/ 241)</label><input type="number" id="f-cols" placeholder="241" /></div>
      </div>
      <button class="btn-save" onclick="saveSprint()">Enregistrer</button>
      <button class="btn-cancel" onclick="toggleForm()">Annuler</button>
    </div>

    <div id="main-content"></div>
  </div>
</div>

<script>
var SECRET = '@lgoritHme+977_73300';

function login(){
  var v = document.getElementById('pwd').value;
  if(v === SECRET){
    sessionStorage.setItem('ag_qual','1');
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  } else {
    var el=document.getElementById('auth-err');
    el.textContent='Mot de passe incorrect';
    document.getElementById('pwd').value='';
    setTimeout(function(){el.textContent='';},3000);
  }
}
function logout(){ sessionStorage.removeItem('ag_qual'); location.reload(); }
window.addEventListener('DOMContentLoaded',function(){
  if(sessionStorage.getItem('ag_qual')==='1'){
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }
});

/* ══ DATA ══ */
var DEFAULT_DATA = {
  sprints:[
    {sprint:'S54',date:'26/03/2026',scores:{backend:53,frontend:55,bdd:60},metrics:{routes:90,pages:100,jsdoc:0,cols:0}},
    {sprint:'S55',date:'26/03/2026',scores:{backend:70,frontend:68,bdd:72},metrics:{routes:90,pages:100,jsdoc:50,cols:100}},
    {sprint:'S56',date:'27/03/2026',scores:{backend:78,frontend:75,bdd:80},metrics:{routes:90,pages:100,jsdoc:100,cols:180}},
    {sprint:'S57',date:'28/03/2026',scores:{backend:82,frontend:80,bdd:85},metrics:{routes:90,pages:100,jsdoc:133,cols:241}}
  ],
  patches:[
    {id:'BE-001',titre:'Corriger les catch vides restants',desc:'Ajouter res.status(500).json({ error: e.message })',risque:'FAIBLE'},
    {id:'BE-003',titre:"Extraire module 'factures' vers api/src/routes/factures.ts",desc:'Découper custom-routes.ts — commencer par le domaine factures (priorité ORANGE S58)',risque:'MOYEN'},
    {id:'FE-001',titre:"Remplacer window.open() — Audit PDF Modal",desc:'Convertir tous les appels PDF en modales avec blob URL',risque:'MOYEN'},
    {id:'FE-002',titre:"Centraliser fmtDate/fmtMontant vers src/lib/helpers.ts",desc:'Supprimer les définitions locales dupliquées',risque:'FAIBLE'},
    {id:'FE-004',titre:"Créer la structure src/services/",desc:'api.ts, factures.ts, seances.ts, clients.ts',risque:'NULS'},
    {id:'BDD-001',titre:"Compléter les commentaires colonnes BDD",desc:'Générer les ALTER TABLE COMMENT pour les colonnes restantes',risque:'FAIBLE'}
  ]
};

function loadData(){
  try{
    var d=localStorage.getItem('ag_qual_data');
    if(d) return JSON.parse(d);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData(data){ localStorage.setItem('ag_qual_data',JSON.stringify(data)); }

var DATA = loadData();
var selectedSprint = DATA.sprints.length ? DATA.sprints[DATA.sprints.length-1].sprint : 'S57';

function toggleForm(){
  var f=document.getElementById('sprint-form');
  f.classList.toggle('open');
  if(f.classList.contains('open')){
    var last=DATA.sprints[DATA.sprints.length-1];
    if(last){
      var n=parseInt(last.sprint.replace(/\D/g,''))||57;
      document.getElementById('f-sprint').value='S'+(n+1);
    }
  }
}

function saveSprint(){
  var sp=document.getElementById('f-sprint').value.trim();
  var back=+document.getElementById('f-back').value||0;
  var front=+document.getElementById('f-front').value||0;
  var bdd=+document.getElementById('f-bdd').value||0;
  var routes=+document.getElementById('f-routes').value||0;
  var pages=+document.getElementById('f-pages').value||0;
  var jsdoc=+document.getElementById('f-jsdoc').value||0;
  var cols=+document.getElementById('f-cols').value||0;
  if(!sp){ alert('Sprint requis'); return; }
  DATA.sprints=DATA.sprints.filter(function(s){return s.sprint!==sp;});
  DATA.sprints.push({
    sprint:sp,
    date:new Date().toLocaleDateString('fr-FR'),
    scores:{backend:back,frontend:front,bdd:bdd},
    metrics:{routes:routes,pages:pages,jsdoc:jsdoc,cols:cols}
  });
  DATA.sprints.sort(function(a,b){return a.sprint.localeCompare(b.sprint);});
  selectedSprint=sp;
  saveData(DATA);
  document.getElementById('sprint-form').classList.remove('open');
  render();
}

function selectSprint(sp){ selectedSprint=sp; render(); }

function glo(scores){ return Math.round((scores.backend+scores.frontend+scores.bdd)/3); }

function delta(current, prev){
  if(!prev) return '';
  var d=current-prev;
  if(d>0) return '<span class="delta-up">+'+d+'</span>';
  if(d<0) return '<span class="delta-down">'+d+'</span>';
  return '<span class="delta-flat">→</span>';
}

/* ══ SVG LINE CHART ══ */
function buildChart(sprints){
  if(sprints.length < 2) return '<p style="color:var(--dim);font-size:.8rem;text-align:center;padding:4rem 0">Ajouter au moins 2 sprints pour afficher le graphique</p>';
  var W=800, H=180, PAD=40;
  var n=sprints.length;
  var allScores=[];
  sprints.forEach(function(s){ allScores.push(s.scores.backend,s.scores.frontend,s.scores.bdd); });
  var minV=Math.max(0,Math.min.apply(null,allScores)-10);
  var maxV=100;
  function x(i){ return PAD+(i/(n-1))*(W-PAD*2); }
  function y(v){ return H-PAD-(v-minV)/(maxV-minV)*(H-PAD*1.5); }
  function path(key,color){
    var d=sprints.map(function(s,i){ return (i===0?'M':'L')+x(i).toFixed(1)+','+y(s.scores[key]).toFixed(1); }).join(' ');
    return '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  function dots(key,color){
    return sprints.map(function(s,i){
      return '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(s.scores[key]).toFixed(1)+'" r="4" fill="'+color+'" stroke="var(--navy-l)" stroke-width="2"/>'
        +'<text x="'+x(i).toFixed(1)+'" y="'+(y(s.scores[key])-10).toFixed(1)+'" text-anchor="middle" fill="'+color+'" font-size="10" font-family="DM Sans,sans-serif">'+s.scores[key]+'</text>';
    }).join('');
  }
  var xLabels=sprints.map(function(s,i){
    return '<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" fill="var(--dim)" font-size="11" font-family="DM Sans,sans-serif">'+s.sprint+'</text>';
  }).join('');
  var yLines=[60,70,80,90,100].map(function(v){
    return '<line x1="'+PAD+'" y1="'+y(v).toFixed(1)+'" x2="'+(W-PAD)+'" y2="'+y(v).toFixed(1)+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>'
      +'<text x="'+(PAD-6)+'" y="'+(y(v)+4).toFixed(1)+'" text-anchor="end" fill="var(--dim)" font-size="10" font-family="DM Sans,sans-serif">'+v+'</text>';
  }).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">'
    +yLines
    +path('backend','#D4A843')+path('frontend','#5b9bd5')+path('bdd','#4caf82')
    +dots('backend','#D4A843')+dots('frontend','#5b9bd5')+dots('bdd','#4caf82')
    +xLabels
    +'<text x="'+W+'" y="20" text-anchor="end" fill="#D4A843" font-size="10" font-family="DM Sans,sans-serif">■ Backend</text>'
    +'<text x="'+W+'" y="34" text-anchor="end" fill="#5b9bd5" font-size="10" font-family="DM Sans,sans-serif">■ Frontend</text>'
    +'<text x="'+W+'" y="48" text-anchor="end" fill="#4caf82" font-size="10" font-family="DM Sans,sans-serif">■ BDD</text>'
    +'</svg>';
}

/* ══ RENDER ══ */
function render(){
  var current=DATA.sprints.find(function(s){return s.sprint===selectedSprint;});
  if(!current && DATA.sprints.length) current=DATA.sprints[DATA.sprints.length-1];
  var prevIdx=DATA.sprints.indexOf(current)-1;
  var prev=prevIdx>=0?DATA.sprints[prevIdx]:null;

  if(!current){ document.getElementById('main-content').innerHTML='<p style="color:var(--muted);padding:2rem">Aucune donnée. Cliquez sur "+ Saisir sprint" pour commencer.</p>'; return; }

  var g=glo(current.scores);
  var gPrev=prev?glo(prev.scores):null;

  /* Progression objectif */
  var targetScore=90;

  var html='';

  /* Sprint nav */
  html+='<div class="sprint-nav">'+DATA.sprints.map(function(s){
    return '<button class="sp-btn'+(s.sprint===selectedSprint?' on':'')+'" onclick="selectSprint(\''+s.sprint+'\')">'+s.sprint+'</button>';
  }).join('')+'</div>';

  /* KPIs */
  html+='<div class="kpi-grid">';
  html+='<div class="kpi"><div class="kpi-label">Score global</div><div class="kpi-value" style="color:'+(g>=80?'var(--ok)':g>=60?'var(--warn)':'var(--err)')+'">'+g+'</div><div class="kpi-sub">/100</div><div class="kpi-delta">'+delta(g,gPrev)+' vs sprint précédent</div></div>';
  html+='<div class="kpi"><div class="kpi-label">Backend</div><div class="kpi-value">'+current.scores.backend+'</div><div class="kpi-sub">/100 — '+current.metrics.routes+' routes API</div><div class="kpi-delta">'+delta(current.scores.backend,prev?prev.scores.backend:null)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-label">Frontend</div><div class="kpi-value">'+current.scores.frontend+'</div><div class="kpi-sub">/100 — '+current.metrics.pages+' pages UI</div><div class="kpi-delta">'+delta(current.scores.frontend,prev?prev.scores.frontend:null)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-label">BDD</div><div class="kpi-value">'+current.scores.bdd+'</div><div class="kpi-sub">/100 — '+current.metrics.cols+'/241 cols commentées</div><div class="kpi-delta">'+delta(current.scores.bdd,prev?prev.scores.bdd:null)+'</div></div>';
  html+='</div>';

  /* Chart evolution */
  html+='<div class="chart-card"><div class="card-hd">Evolution des scores</div><div class="chart-area">'+buildChart(DATA.sprints)+'</div></div>';

  /* Barres detail */
  html+='<div class="bars-grid">';

  /* Backend */
  html+='<div class="bar-card"><div class="bar-title">Backend</div>';
  [['Score qualité',current.scores.backend,100,'#D4A843'],
   ['Routes API',current.metrics.routes,120,'#5b9bd5'],
   ['Objectif S58+',Math.min(targetScore,current.scores.backend),targetScore,'#4caf82']
  ].forEach(function(row){
    var pct=Math.round(row[1]/row[2]*100);
    html+='<div class="bar-item"><div class="bar-row"><span class="bar-label">'+row[0]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+row[3]+'"></div></div><span class="bar-val" style="color:'+row[3]+'">'+row[1]+'</span></div></div>';
  });
  html+='</div>';

  /* Frontend */
  html+='<div class="bar-card"><div class="bar-title">Frontend</div>';
  [['Score qualité',current.scores.frontend,100,'#5b9bd5'],
   ['Pages UI',current.metrics.pages,120,'#D4A843'],
   ['JSDoc',current.metrics.jsdoc,137,'#4caf82']
  ].forEach(function(row){
    var pct=Math.round(row[1]/row[2]*100);
    html+='<div class="bar-item"><div class="bar-row"><span class="bar-label">'+row[0]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+row[3]+'"></div></div><span class="bar-val" style="color:'+row[3]+'">'+row[1]+'</span></div></div>';
  });
  html+='</div>';

  /* BDD */
  html+='<div class="bar-card"><div class="bar-title">BDD</div>';
  [['Score qualité',current.scores.bdd,100,'#4caf82'],
   ['Cols commentées',current.metrics.cols,241,'#D4A843'],
   ['Taux',Math.round(current.metrics.cols/241*100),100,'#5b9bd5']
  ].forEach(function(row){
    var pct=Math.round(row[1]/row[2]*100);
    html+='<div class="bar-item"><div class="bar-row"><span class="bar-label">'+row[0]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+row[3]+'"></div></div><span class="bar-val" style="color:'+row[3]+'">'+(row[0]==='Taux'?row[1]+'%':row[1])+'</span></div></div>';
  });
  html+='</div>';

  html+='</div>';

  /* Patches en attente */
  html+='<div class="patches-card"><div class="card-hd">Patches qualité en attente</div>';
  var rmap={'NULS':'r-nul','FAIBLE':'r-faible','MOYEN':'r-moyen','ELEVE':'r-eleve'};
  DATA.patches.forEach(function(p){
    html+='<div class="patch-row">'
      +'<span class="patch-id">'+p.id+'</span>'
      +'<div class="patch-body"><div class="patch-titre">'+p.titre+'</div><div class="patch-desc">'+p.desc+'</div></div>'
      +'<span class="risque-badge '+( rmap[p.risque]||'r-moyen')+'">'+p.risque+'</span>'
      +'</div>';
  });
  html+='<div style="margin-top:.75rem;font-size:.72rem;color:var(--dim)">Générer les patches détaillés : <code style="color:var(--gold)">python animgest_quality.py --apply</code></div>';
  html+='</div>';

  /* Historique */
  html+='<div class="patches-card"><div class="card-hd">Historique des sprints</div>';
  html+='<div style="overflow-x:auto"><table style="width:100%;font-size:.8rem;border-collapse:collapse">';
  html+='<thead><tr style="color:var(--dim);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em">'
    +'<td style="padding:.5rem .75rem">Sprint</td><td>Date</td><td>Backend</td><td>Frontend</td><td>BDD</td><td>Global</td><td>Routes</td><td>Pages</td><td>JSDoc</td><td>Cols BDD</td>'
    +'</tr></thead><tbody>';
  DATA.sprints.slice().reverse().forEach(function(s){
    var g=glo(s.scores);
    var c=g>=80?'var(--ok)':g>=60?'var(--warn)':'var(--err)';
    html+='<tr style="border-top:1px solid var(--bdr)'+(s.sprint===selectedSprint?';background:var(--gold-p)':'')+'">'
      +'<td style="padding:.5rem .75rem;font-weight:600;color:var(--gold)">'+s.sprint+'</td>'
      +'<td style="color:var(--muted)">'+s.date+'</td>'
      +'<td>'+s.scores.backend+'</td>'
      +'<td>'+s.scores.frontend+'</td>'
      +'<td>'+s.scores.bdd+'</td>'
      +'<td style="font-weight:700;color:'+c+'">'+g+'</td>'
      +'<td style="color:var(--muted)">'+s.metrics.routes+'</td>'
      +'<td style="color:var(--muted)">'+s.metrics.pages+'</td>'
      +'<td style="color:var(--muted)">'+s.metrics.jsdoc+'/137</td>'
      +'<td style="color:var(--muted)">'+s.metrics.cols+'/241</td>'
      +'</tr>';
  });
  html+='</tbody></table></div></div>';

  document.getElementById('main-content').innerHTML=html;
}
</script>

      onmouseover="this.style.borderColor='rgba(212,168,67,.28)';this.style.color='#e8edf2'"

      onmouseover="this.style.borderColor='rgba(212,168,67,.28)';this.style.color='#e8edf2'"

<script>
window.addEventListener('DOMContentLoaded', function(){
  if(sessionStorage.getItem('ag_qual')==='1'){
    document.getElementById('dash-footer').style.display='flex';
  }
  // Lecture params URL pour pré-remplir depuis le générateur
  var params = new URLSearchParams(window.location.search);
  if(params.get('sprint')){
    setTimeout(function(){
      var f = document.getElementById('sprint-form');
      if(f){
        f.classList.add('open');
        var set = function(id, val){ var el=document.getElementById(id); if(el && val) el.value=val; };
        set('f-sprint',  params.get('sprint'));
        set('f-back',    params.get('back'));
        set('f-front',   params.get('front'));
        set('f-bdd',     params.get('bdd'));
        set('f-routes',  params.get('routes'));
        set('f-pages',   params.get('pages'));
        set('f-jsdoc',   params.get('jsdoc'));
        set('f-cols',    params.get('cols'));
      }
    }, 100);
  }
});
</script>
