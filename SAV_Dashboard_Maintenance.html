<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>Dashboard Maintenance — Anim'Gest</title>
<style>
:root{--navy:#0D2137;--navy-l:#112840;--navy-m:#1a3a5c;--gold:#D4A843;--gold-l:#e8c265;--gold-p:rgba(212,168,67,.13);--gold-b:rgba(212,168,67,.28);--text:#e8edf2;--muted:#8fa3b8;--dim:#4a6a82;--bdr:rgba(255,255,255,.08);--ok:#4caf82;--warn:#e8a84a;--err:#e05c5c;--info:#5b9bd5;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui;background:var(--navy);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
a{color:var(--gold);text-decoration:none}

#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;
  background:radial-gradient(ellipse at 30% 40%,rgba(212,168,67,.07) 0%,transparent 60%),var(--navy)}
.auth-box{background:var(--navy-l);border:1px solid var(--gold-b);border-radius:18px;padding:3rem 2.5rem;max-width:400px;width:100%;text-align:center}
.auth-logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:.2rem}
.auth-tag{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem}
.auth-input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--gold-b);border-radius:9px;padding:.8rem 1rem;color:var(--text);font-size:1rem;font-family:inherit;text-align:center;letter-spacing:.25em;outline:none;margin-bottom:.75rem;transition:border-color .2s}
.auth-input:focus{border-color:var(--gold)}
.auth-btn{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:.75rem;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit}
.auth-err{color:var(--err);font-size:.75rem;margin-top:.6rem;min-height:1rem}

#app{display:none}
header{background:var(--navy-l);border-bottom:1px solid var(--gold-b);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
.h-brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.15rem}
.h-brand small{font-size:.72rem;color:var(--muted);margin-left:.75rem;font-weight:300;font-family:'DM Sans',sans-serif}
.h-actions{display:flex;gap:.75rem;align-items:center}
.btn-add{background:var(--gold);border:none;border-radius:8px;padding:.5rem 1.1rem;color:var(--navy);font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
.logout{background:none;border:none;color:var(--dim);font-size:.72rem;cursor:pointer;font-family:inherit}

.wrap{max-width:1100px;margin:0 auto;padding:1.75rem 1.5rem 5rem}
.sec-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin:2rem 0 1rem;padding-bottom:.6rem;border-bottom:1px solid var(--gold-b)}

/* STATUS INDICATORS */
.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.status-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem}
.status-card.ok{border-color:rgba(76,175,130,.35);background:rgba(76,175,130,.06)}
.status-card.warn{border-color:rgba(232,168,74,.35);background:rgba(232,168,74,.06)}
.status-card.err{border-color:rgba(224,92,92,.35);background:rgba(224,92,92,.06)}
.status-icon{font-size:1.3rem;margin-bottom:.4rem}
.status-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem}
.status-score{font-size:1.8rem;font-weight:700;font-family:'Playfair Display',serif;line-height:1}
.status-desc{font-size:.7rem;color:var(--muted);margin-top:.3rem}

/* CMD BUTTONS */
.cmd-section{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem 1.4rem;margin-bottom:1rem}
.cmd-section-title{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.85rem}
.cmd-grid{display:flex;flex-direction:column;gap:7px}
.cmd-btn{background:rgba(0,0,0,.3);border:1px solid var(--bdr);border-radius:7px;padding:.55rem .85rem;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;gap:2px;user-select:none;text-align:left}
.cmd-btn:hover{border-color:var(--gold-b);background:rgba(212,168,67,.08)}
.cmd-btn.copied{border-color:var(--ok);background:rgba(76,175,130,.1)}
.cmd-btn-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--dim)}
.cmd-btn-code{font-family:'Courier New',monospace;font-size:.7rem;color:var(--ok);line-height:1.4}
.cmd-copy-hint{position:absolute;top:.45rem;right:.7rem;font-size:.62rem;font-weight:600;color:var(--gold);opacity:.6}
.cmd-btn:hover .cmd-copy-hint{opacity:1}
.cmd-btn.copied .cmd-copy-hint{color:var(--ok);opacity:1}
.cmd-row{display:flex;gap:7px}
.cmd-btn-sm{flex:1}

/* ISSUES LIST */
.issues-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem 1.4rem;margin-bottom:1rem}
.issue-item{display:flex;align-items:flex-start;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--bdr);font-size:.8rem}
.issue-item:last-child{border-bottom:none}
.issue-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot-err{background:var(--err)}
.dot-warn{background:var(--warn)}
.dot-ok{background:var(--ok)}
.issue-text{flex:1;color:var(--muted)}
.issue-badge{font-size:.62rem;font-weight:600;padding:.12rem .45rem;border-radius:4px;flex-shrink:0}
.b-infra{background:rgba(91,155,213,.15);color:var(--info)}
.b-api{background:rgba(76,175,130,.15);color:var(--ok)}
.b-dette{background:rgba(232,168,74,.15);color:var(--warn)}
.b-secu{background:rgba(224,92,92,.15);color:var(--err)}

/* SPRINT SELECTOR */
.sprint-nav{display:flex;gap:5px;margin-bottom:1.5rem;flex-wrap:wrap}
.sp-btn{padding:.35rem .9rem;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;font-family:inherit}
.sp-btn:hover{border-color:var(--gold-b);color:var(--text)}
.sp-btn.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}

/* FORM */
.sprint-form{background:var(--navy-l);border:1px solid var(--gold-b);border-radius:var(--r);padding:1.4rem 1.5rem;margin-bottom:1rem;display:none}
.sprint-form.open{display:block}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.sf .lbl{display:block;font-size:.7rem;color:var(--muted);margin-bottom:.3rem}
.sf input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--bdr);border-radius:7px;padding:.5rem .8rem;color:var(--text);font-size:.85rem;font-family:inherit;outline:none}
.sf input:focus{border-color:var(--gold-b)}
.btn-save{background:var(--gold);border:none;border-radius:7px;padding:.55rem 1.25rem;color:var(--navy);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cancel{background:transparent;border:1px solid var(--bdr);border-radius:7px;padding:.55rem 1rem;color:var(--muted);font-size:.82rem;cursor:pointer;font-family:inherit;margin-left:.5rem}

/* CHART */
.chart-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.4rem 1.5rem;margin-bottom:1rem}
.chart-area{height:200px}

/* HISTORY TABLE */
.hist-card{background:var(--navy-l);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem 1.4rem}
.hist-table{width:100%;border-collapse:collapse;font-size:.78rem}
.hist-table th{text-align:left;padding:.4rem .65rem;font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);border-bottom:1px solid var(--bdr)}
.hist-table td{padding:.5rem .65rem;border-bottom:1px solid var(--bdr)}
.hist-table tr:hover td{background:rgba(255,255,255,.02)}
.score-pill{display:inline-block;padding:.12rem .5rem;border-radius:4px;font-size:.68rem;font-weight:600}
.pill-ok{background:rgba(76,175,130,.15);color:var(--ok)}
.pill-warn{background:rgba(232,168,74,.15);color:var(--warn)}
.pill-err{background:rgba(224,92,92,.15);color:var(--err)}

/* FOOTER NAV */
#dash-footer{display:none;background:#112840;border-top:1px solid rgba(212,168,67,.28);padding:.85rem 2rem;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;bottom:0;z-index:100}
.f-link{font-size:.75rem;color:var(--muted);text-decoration:none;padding:.35rem .85rem;border:1px solid rgba(255,255,255,.08);border-radius:6px;transition:all .2s}
.f-link:hover{border-color:rgba(212,168,67,.28);color:var(--text)}

@media(max-width:768px){.status-grid{grid-template-columns:repeat(2,1fr)}.sg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">Anim'Gest</div>
    <div class="auth-tag">NoSage's Editor &middot; Dashboard Maintenance</div>
    <input class="auth-input" type="password" id="pwd" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" onkeydown="if(event.key==='Enter')login()" autofocus />
    <button class="auth-btn" onclick="login()">Accéder &rarr;</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="h-brand">Anim'Gest <small>Dashboard Maintenance</small></div>
    <div class="h-actions">
      <button class="btn-add" onclick="toggleForm()">+ Saisir bilan</button>
      <button class="logout" onclick="logout()">Déconnexion</button>
    </div>
  </header>
  <div class="wrap">

    <!-- FORM -->
    <div class="sprint-form" id="sprint-form">
      <div style="font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--gold-b);font-size:1rem">Saisir les résultats de maintenance</div>
      <div class="sg">
        <div class="sf"><label class="lbl">Sprint</label><input type="text" id="f-sprint" placeholder="S58" /></div>
        <div class="sf"><label class="lbl">Infrastructure /100</label><input type="number" id="f-infra" min="0" max="100" /></div>
        <div class="sf"><label class="lbl">Routes API /100</label><input type="number" id="f-api" min="0" max="100" /></div>
        <div class="sf"><label class="lbl">Dette technique /100</label><input type="number" id="f-dette" min="0" max="100" /></div>
      </div>
      <div class="sg">
        <div class="sf"><label class="lbl">Sécurité /100</label><input type="number" id="f-secu" min="0" max="100" /></div>
        <div class="sf"><label class="lbl">Containers UP</label><input type="number" id="f-containers" min="0" max="3" placeholder="3" /></div>
        <div class="sf"><label class="lbl">Routes OK / total</label><input type="text" id="f-routes-ok" placeholder="9/10" /></div>
        <div class="sf"><label class="lbl">Fichiers .bak</label><input type="number" id="f-bak" placeholder="0" /></div>
      </div>
      <div class="sf" style="margin-bottom:1rem"><label class="lbl">Points d'action (séparés par |)</label>
        <input type="text" id="f-issues" placeholder="Route /formules retourne 404 | 28 fichiers .bak à nettoyer" /></div>
      <button class="btn-save" onclick="saveSprint()">Enregistrer</button>
      <button class="btn-cancel" onclick="toggleForm()">Annuler</button>
    </div>

    <div id="main-content"></div>
  </div>
</div>

<div id="dash-footer">
  <a href="index.html" style="font-size:.78rem;font-weight:600;color:var(--gold)">← Index documentation</a>
  <div style="display:flex;gap:10px">
    <a href="SAV_Pilotage_Qualite.html" class="f-link">📐 Pilotage Qualité</a>
    <a href="SAV_Generator_Handover.html" class="f-link">📋 Générateur Handover</a>
    <a href="SAV_Dashboard_Qualite.html" class="f-link">📊 Dashboard Qualité Code</a>
  </div>
</div>

<script>
var SECRET = '@lgoritHme+977_73300';

function login(){
  var v = document.getElementById('pwd').value;
  if(v === SECRET){
    sessionStorage.setItem('ag_maint','1');
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('dash-footer').style.display='flex';
    loadState(); render();
  } else {
    var el=document.getElementById('auth-err');
    el.textContent='Mot de passe incorrect';
    document.getElementById('pwd').value='';
    setTimeout(function(){el.textContent='';},3000);
  }
}
function logout(){ sessionStorage.removeItem('ag_maint'); location.reload(); }
window.addEventListener('DOMContentLoaded',function(){
  if(sessionStorage.getItem('ag_maint')==='1'){
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('dash-footer').style.display='flex';
    // Lecture params URL depuis le générateur
    var params = new URLSearchParams(window.location.search);
    if(params.get('sprint')){
      setTimeout(function(){
        var f=document.getElementById('sprint-form');
        if(f){ f.classList.add('open'); }
        var set=function(id,val){var el=document.getElementById(id);if(el&&val)el.value=val;};
        set('f-sprint', params.get('sprint'));
        set('f-infra',  params.get('infra'));
        set('f-api',    params.get('api'));
        set('f-dette',  params.get('dette'));
        set('f-secu',   params.get('secu'));
      },100);
    }
    loadState(); render();
  }
});

/* ══ DATA ══ */
var DEFAULT = {
  sprints:[
    {sprint:'S57',date:'28/03/2026',scores:{infrastructure:90,api:85,dette:60,securite:80},global:79,
     metrics:{containers:3,routes_ok:'9/10',bak_files:45},
     issues:['45 fichiers .bak — session nettoyage nécessaire','Route /formules non testée']}
  ]
};
var D = JSON.parse(JSON.stringify(DEFAULT));
var sel = 'S57';

function loadState(){ try{ var d=localStorage.getItem('ag_maint_data'); if(d) D=JSON.parse(d); sel=D.sprints.length?D.sprints[D.sprints.length-1].sprint:'S57'; }catch(e){} }
function saveState(){ localStorage.setItem('ag_maint_data',JSON.stringify(D)); }

function toggleForm(){
  var f=document.getElementById('sprint-form');
  f.classList.toggle('open');
  if(f.classList.contains('open')){
    var last=D.sprints[D.sprints.length-1];
    if(last){ var n=parseInt(last.sprint.replace(/\D/g,''))||57; document.getElementById('f-sprint').value='S'+(n+1); }
  }
}

function saveSprint(){
  var sp=document.getElementById('f-sprint').value.trim();
  if(!sp){alert('Sprint requis');return;}
  var infra=+document.getElementById('f-infra').value||0;
  var api=+document.getElementById('f-api').value||0;
  var dette=+document.getElementById('f-dette').value||0;
  var secu=+document.getElementById('f-secu').value||0;
  var containers=+document.getElementById('f-containers').value||3;
  var routes_ok=document.getElementById('f-routes-ok').value||'?';
  var bak=+document.getElementById('f-bak').value||0;
  var issues_raw=document.getElementById('f-issues').value||'';
  var issues=issues_raw.split('|').map(function(s){return s.trim();}).filter(Boolean);
  var global=Math.round((infra+api+dette+secu)/4);
  D.sprints=D.sprints.filter(function(s){return s.sprint!==sp;});
  D.sprints.push({sprint:sp,date:new Date().toLocaleDateString('fr-FR'),
    scores:{infrastructure:infra,api:api,dette:dette,securite:secu},
    global:global,metrics:{containers:containers,routes_ok:routes_ok,bak_files:bak},issues:issues});
  D.sprints.sort(function(a,b){return a.sprint.localeCompare(b.sprint);});
  sel=sp; saveState();
  document.getElementById('sprint-form').classList.remove('open');
  render();
}

function selectSprint(sp){ sel=sp; render(); }
function sc(v){ return v>=80?'var(--ok)':v>=60?'var(--warn)':'var(--err)'; }
function pill(v){ return v>=80?'pill-ok':v>=60?'pill-warn':'pill-err'; }

function copyCmd(el, text){
  navigator.clipboard.writeText(text.replace(/&quot;/g,'"').replace(/&amp;/g,'&')).then(function(){
    el.classList.add('copied');
    var h=el.querySelector('.cmd-copy-hint'); if(h){h.textContent='Copié ✓';}
    setTimeout(function(){ el.classList.remove('copied'); var h=el.querySelector('.cmd-copy-hint'); if(h){h.textContent='Copier';} },2000);
  });
}

/* SVG CHART */
function buildChart(sprints){
  if(sprints.length<2) return '<p style="color:var(--dim);font-size:.8rem;text-align:center;padding:3rem 0">Ajouter au moins 2 sprints pour le graphique</p>';
  var W=800,H=170,P=40;
  var n=sprints.length;
  function x(i){return P+(i/(n-1))*(W-P*2);}
  function y(v){return H-P-(v-50)/(100-50)*(H-P*1.5);}
  function path(key,color){
    var d=sprints.map(function(s,i){return(i===0?'M':'L')+x(i).toFixed(1)+','+y(s.scores[key]||0).toFixed(1);}).join(' ');
    return '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round"/>';
  }
  function dots(key,color){
    return sprints.map(function(s,i){
      var v=s.scores[key]||0;
      return '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(v).toFixed(1)+'" r="4" fill="'+color+'" stroke="var(--navy-l)" stroke-width="2"/>'
        +'<text x="'+x(i).toFixed(1)+'" y="'+(y(v)-9).toFixed(1)+'" text-anchor="middle" fill="'+color+'" font-size="10" font-family="DM Sans,sans-serif">'+v+'</text>';
    }).join('');
  }
  var xLabels=sprints.map(function(s,i){return '<text x="'+x(i).toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" fill="var(--dim)" font-size="11" font-family="DM Sans,sans-serif">'+s.sprint+'</text>';}).join('');
  var yLines=[60,70,80,90,100].map(function(v){
    return '<line x1="'+P+'" y1="'+y(v).toFixed(1)+'" x2="'+(W-P)+'" y2="'+y(v).toFixed(1)+'" stroke="rgba(255,255,255,.05)" stroke-width="1"/>'
      +'<text x="'+(P-5)+'" y="'+(y(v)+4).toFixed(1)+'" text-anchor="end" fill="var(--dim)" font-size="10" font-family="DM Sans,sans-serif">'+v+'</text>';
  }).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:100%">'
    +yLines
    +path('infrastructure','#5b9bd5')+path('api','#4caf82')+path('dette','#e8a84a')+path('securite','#e05c5c')
    +dots('infrastructure','#5b9bd5')+dots('api','#4caf82')+dots('dette','#e8a84a')+dots('securite','#e05c5c')
    +xLabels
    +'<text x="'+W+'" y="16" text-anchor="end" fill="#5b9bd5" font-size="10" font-family="DM Sans,sans-serif">■ Infra</text>'
    +'<text x="'+W+'" y="30" text-anchor="end" fill="#4caf82" font-size="10" font-family="DM Sans,sans-serif">■ API</text>'
    +'<text x="'+W+'" y="44" text-anchor="end" fill="#e8a84a" font-size="10" font-family="DM Sans,sans-serif">■ Dette</text>'
    +'<text x="'+W+'" y="58" text-anchor="end" fill="#e05c5c" font-size="10" font-family="DM Sans,sans-serif">■ Sécu</text>'
    +'</svg>';
}

function render(){
  var cur=D.sprints.find(function(s){return s.sprint===sel;});
  if(!cur&&D.sprints.length) cur=D.sprints[D.sprints.length-1];

  // Sprint nav
  var html='<div class="sprint-nav">'+D.sprints.map(function(s){
    return '<button class="sp-btn'+(s.sprint===sel?' on':'')+'" onclick="selectSprint(\''+s.sprint+'\')">'+s.sprint+'</button>';
  }).join('')+'</div>';

  if(!cur){html+='<p style="color:var(--muted);padding:2rem">Aucune donnée. Cliquer sur "+ Saisir bilan".</p>';document.getElementById('main-content').innerHTML=html;return;}

  var scores=cur.scores; var g=cur.global;
  var icons={infrastructure:'🐳',api:'🔌',dette:'🗂️',securite:'🔒'};
  var labels={infrastructure:'Infrastructure',api:'Routes API',dette:'Dette technique',securite:'Sécurité'};

  // Status cards
  html+='<div class="status-grid">';
  ['infrastructure','api','dette','securite'].forEach(function(k){
    var v=scores[k]||0;
    var cls=v>=80?'ok':v>=60?'warn':'err';
    html+='<div class="status-card '+cls+'">'
      +'<div class="status-icon">'+icons[k]+'</div>'
      +'<div class="status-label">'+labels[k]+'</div>'
      +'<div class="status-score" style="color:'+sc(v)+'">'+v+'</div>'
      +'<div class="status-desc">/100</div>'
      +'</div>';
  });
  // Global
  html+='</div>';

  // Global KPI
  html+='<div style="background:var(--gold-p);border:1px solid var(--gold-b);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center">'
    +'<div><div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem">Score global maintenance — '+cur.sprint+'</div>'
    +'<div style="font-size:.75rem;color:var(--muted)">Containers : '+cur.metrics.containers+'/3 &nbsp;|&nbsp; Routes OK : '+(cur.metrics.routes_ok||'?')+' &nbsp;|&nbsp; Fichiers .bak : '+(cur.metrics.bak_files||'?')+'</div>'
    +'</div>'
    +'<div style="font-size:2.5rem;font-weight:700;font-family:serif;color:'+sc(g)+'">'+g+'<span style="font-size:1rem;color:var(--muted)">/100</span></div>'
    +'</div>';

  // Issues
  if(cur.issues&&cur.issues.length){
    html+='<div class="sec-title">Points d\'action identifiés</div>';
    html+='<div class="issues-card">';
    var badgeMap={'Route':'b-api','Contai':'b-infra','.bak':'b-dette','inject':'b-dette','token':'b-secu','password':'b-secu','secret':'b-secu','Sécu':'b-secu','CRITI':'b-secu'};
    cur.issues.forEach(function(issue){
      var badge='b-dette';
      Object.keys(badgeMap).forEach(function(k){ if(issue.indexOf(k)>=0) badge=badgeMap[k]; });
      var isCrit=issue.indexOf('CRITIQUE')>=0||issue.indexOf('exposé')>=0;
      html+='<div class="issue-item">'
        +'<div class="issue-dot '+(isCrit?'dot-err':'dot-warn')+'"></div>'
        +'<div class="issue-text">'+issue+'</div>'
        +'<span class="issue-badge '+badge+'">'+(badge==='b-infra'?'Infra':badge==='b-api'?'API':badge==='b-secu'?'Sécu':'Dette')+'</span>'
        +'</div>';
    });
    html+='</div>';
  }

  // Commandes
  html+='<div class="sec-title">Lancer le diagnostic — cliquer pour copier</div>';
  var ROOT_PATH = 'D:\\OneDrive_Perso\\OneDrive\\Documents\\Micro_Logiciel\\Documentation\\Frontend\\micro_logiciel_frontend_nextjs';
  html+='<div class="cmd-section"><div class="cmd-section-title">animgest_maintenance.py</div><div class="cmd-grid">';

  var cmds=[
    ['Diagnostic complet', 'cd "'+ROOT_PATH+'"\npython animgest_maintenance.py --sprint '+cur.sprint],
    ['Infrastructure uniquement', 'cd "'+ROOT_PATH+'"\npython animgest_maintenance.py --infra --sprint '+cur.sprint],
    ['Routes API uniquement', 'cd "'+ROOT_PATH+'"\npython animgest_maintenance.py --api --sprint '+cur.sprint],
    ['Dette technique', 'cd "'+ROOT_PATH+'"\npython animgest_maintenance.py --dette --sprint '+cur.sprint],
    ['Sécurité', 'cd "'+ROOT_PATH+'"\npython animgest_maintenance.py --securite --sprint '+cur.sprint],
  ];

  cmds.forEach(function(cmd){
    html+='<div class="cmd-btn" onclick="copyCmd(this,\''+cmd[1].replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')+'\')">'
      +'<div class="cmd-btn-label">'+cmd[0]+'</div>'
      +'<div class="cmd-btn-code">'+cmd[1].split('\n')[1]+'</div>'
      +'<div class="cmd-copy-hint">Copier</div>'
      +'</div>';
  });

  // Commandes de nettoyage dette
  html+='</div></div>';
  html+='<div class="cmd-section"><div class="cmd-section-title">Commandes de correction courantes</div><div class="cmd-grid">';

  var fixes=[
    ['Vérifier conteneurs', 'docker ps'],
    ['Relancer le stack', 'cd "'+ROOT_PATH+'\\deploy"\ndocker compose up -d'],
    ['Rebuild API après fix', 'cd "'+ROOT_PATH+'\\deploy"\ndocker compose build api --no-cache && docker compose up -d api && docker compose restart nginx'],
    ['Sauvegarde manuelle', 'PowerShell -ExecutionPolicy Bypass -File "G:\\Sauvegarde_micro_logiciel\\Sauvegarde_micro_logiciel.ps1"'],
    ['Nettoyage cache Docker', 'docker builder prune --force'],
    ['Lister les .bak à supprimer', 'Get-ChildItem "'+ROOT_PATH+'" -Recurse -Filter "*.bak*" | Where-Object {$_.FullName -notlike "*node_modules*"} | Select-Object FullName'],
  ];

  fixes.forEach(function(cmd){
    var display=cmd[1].indexOf('\n')>=0?cmd[1].split('\n').pop():cmd[1];
    if(display.length>60) display=display.substring(0,57)+'...';
    html+='<div class="cmd-btn" onclick="copyCmd(this,\''+cmd[1].replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')+'\')">'
      +'<div class="cmd-btn-label">'+cmd[0]+'</div>'
      +'<div class="cmd-btn-code">'+display+'</div>'
      +'<div class="cmd-copy-hint">Copier</div>'
      +'</div>';
  });
  html+='</div></div>';

  // Graphique
  html+='<div class="sec-title">Évolution maintenance</div>';
  html+='<div class="chart-card"><div class="chart-area">'+buildChart(D.sprints)+'</div></div>';

  // Historique
  html+='<div class="sec-title">Historique des bilans</div>';
  html+='<div class="hist-card"><table class="hist-table"><thead><tr>'
    +'<th>Sprint</th><th>Date</th><th>Infra</th><th>API</th><th>Dette</th><th>Sécu</th><th>Global</th><th>Containers</th><th>Fichiers .bak</th>'
    +'</tr></thead><tbody>';
  D.sprints.slice().reverse().forEach(function(s){
    html+='<tr style="'+(s.sprint===sel?'background:var(--gold-p)':'')+'">'
      +'<td style="font-weight:600;color:var(--gold)">'+s.sprint+'</td>'
      +'<td style="color:var(--muted)">'+s.date+'</td>'
      +'<td><span class="score-pill '+pill(s.scores.infrastructure||0)+'">'+( s.scores.infrastructure||'—')+'</span></td>'
      +'<td><span class="score-pill '+pill(s.scores.api||0)+'">'+( s.scores.api||'—')+'</span></td>'
      +'<td><span class="score-pill '+pill(s.scores.dette||0)+'">'+( s.scores.dette||'—')+'</span></td>'
      +'<td><span class="score-pill '+pill(s.scores.securite||0)+'">'+( s.scores.securite||'—')+'</span></td>'
      +'<td><span class="score-pill '+pill(s.global||0)+'" style="font-size:.75rem">'+( s.global||'—')+'</span></td>'
      +'<td style="color:var(--muted)">'+( s.metrics&&s.metrics.containers!=null?s.metrics.containers+'/3':'—')+'</td>'
      +'<td style="color:'+(s.metrics&&s.metrics.bak_files>30?'var(--warn)':'var(--muted)')+'">'+( s.metrics&&s.metrics.bak_files!=null?s.metrics.bak_files:'—')+'</td>'
      +'</tr>';
  });
  html+='</tbody></table></div>';

  document.getElementById('main-content').innerHTML=html;
}
</script>
</body>
</html>
